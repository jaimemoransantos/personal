name: Deploy Firebase Functions on Merge

on:
  push:
    branches:
      - main

jobs:
  deploy_functions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud with service account
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PERSONAL_67927 }}

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Build functions (TypeScript -> lib)
        working-directory: functions
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Functions (via Firebase)
        run: firebase deploy --only functions --project=personal-67927 --non-interactive
